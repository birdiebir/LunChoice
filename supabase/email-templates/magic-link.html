<!--
  午餐大轉輪 · Magic Link 登入信樣板
  貼到 Supabase 後台：Authentication → Email Templates → Magic Link
  （Subject heading 建議填：🎡 你的午餐大轉輪登入連結）
  可用變數：{{ .ConfirmationURL }} {{ .Email }} {{ .SiteURL }} {{ .Token }}
-->
<div style="background-color:#F4F2EC; padding:32px 16px; font-family:'Microsoft JhengHei','PingFang TC','Noto Sans TC',sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:460px; margin:0 auto;">
    <tr>
      <td style="background-color:#FFFFFF; border:1px solid #E4DFD3; border-radius:18px; padding:36px 30px; box-shadow:0 10px 30px rgba(38,34,27,.10);">

        <div style="text-align:center; margin-bottom:22px;">
          <span style="font-size:34px;">🎡</span>
          <div style="font-size:22px; font-weight:900; letter-spacing:2px; color:#26221B; margin-top:6px;">
            午餐大<span style="color:#D9482B;">轉</span>輪
          </div>
        </div>

        <p style="font-size:15px; color:#26221B; line-height:1.7; margin:0 0 6px;">哈囉 👋</p>
        <p style="font-size:15px; color:#26221B; line-height:1.7; margin:0 0 26px;">
          點下面的按鈕就能登入，今天的 3 次轉盤機會在等你。
        </p>

        <div style="text-align:center; margin:0 0 26px;">
          <a href="{{ .ConfirmationURL }}"
             style="display:inline-block; background-color:#D9482B; color:#FFF8F2; font-size:16px; font-weight:700;
                    text-decoration:none; padding:14px 36px; border-radius:12px; letter-spacing:1px;">
            🍱 登入並開始轉盤
          </a>
        </div>

        <p style="font-size:12.5px; color:#6F675A; line-height:1.6; margin:0 0 4px;">
          按鈕沒反應嗎？複製這個連結貼到瀏覽器打開：
        </p>
        <p style="font-size:12px; color:#1F6E5C; line-height:1.6; word-break:break-all; margin:0 0 22px;">
          {{ .ConfirmationURL }}
        </p>

        <div style="border-top:2px dashed #E4DFD3; padding-top:16px;">
          <p style="font-size:12px; color:#6F675A; line-height:1.6; margin:0;">
            這封信是寄給 <strong style="color:#26221B;">{{ .Email }}</strong> 的登入連結，10 分鐘內有效，且僅能使用一次。
            如果不是你本人操作，忽略這封信即可，不會有任何人登入你的帳號。
          </p>
        </div>

      </td>
    </tr>
    <tr>
      <td style="text-align:center; padding-top:18px;">
        <p style="font-size:11.5px; color:#6F675A; margin:0;">午餐大轉輪 · 基隆路一段 200 號步行圈</p>
      </td>
    </tr>
  </table>
</div>
